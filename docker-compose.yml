services:

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: fueralle
      POSTGRES_USER: fueralle
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fueralle}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fueralle -d fueralle"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: etl/Dockerfile
    command: python migrate.py
    environment:
      DB_DSN: host=postgres dbname=fueralle user=fueralle password=${POSTGRES_PASSWORD:-fueralle}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  etl:
    build:
      context: .
      dockerfile: etl/Dockerfile
    environment:
      DB_DSN: host=postgres dbname=fueralle user=fueralle password=${POSTGRES_PASSWORD:-fueralle}
      TANKERKOENIG_API_KEY: ${TANKERKOENIG_API_KEY:-}
    volumes:
      - raw_data:/data/raw
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  api:
    build:
      context: api
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fueralle
      SPRING_DATASOURCE_USERNAME: fueralle
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-fueralle}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "${PORT:-80}:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  raw_data:
