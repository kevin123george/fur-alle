server {
    listen 80;
    server_name fueralle.byastra.de _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /jobsuche/ {
        proxy_pass https://rest.arbeitsagentur.de/jobboerse/jobsuche-service/;
        proxy_ssl_server_name on;
        proxy_set_header Host rest.arbeitsagentur.de;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
        resolver 1.1.1.1 8.8.8.8 valid=30s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name regiohub.byastra.de;
    root /usr/share/nginx/html;
    index index.html;

    # Swap Für Alle branding → RegioHub for crawlers reading OG tags
    sub_filter_once off;
    sub_filter 'Für Alle — Regionale Daten für Deutschland' 'RegioHub — Regionale Daten für Deutschland';
    sub_filter 'Für Alle — Offene Daten für jeden deutschen Landkreis. Arbeitsmarkt, Wirtschaft, Demografie, Energie und mehr.' 'RegioHub — Deutschlands regionale Datenplattform. Live-Daten zu Beschäftigung, Wirtschaft, Demografie und mehr für jeden Landkreis.';
    sub_filter 'Offene Daten für jeden deutschen Landkreis — Arbeitsmarkt, Wirtschaft, Demografie, Energie und mehr.' 'Live-Daten für jeden deutschen Landkreis — Beschäftigung, Wirtschaft, Demografie und mehr.';
    sub_filter 'https://fueralle.byastra.de' 'https://regiohub.byastra.de';
    sub_filter 'Für Alle, Bundesländer' 'RegioHub, Bundesländer';

    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /jobsuche/ {
        proxy_pass https://rest.arbeitsagentur.de/jobboerse/jobsuche-service/;
        proxy_ssl_server_name on;
        proxy_set_header Host rest.arbeitsagentur.de;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
        resolver 1.1.1.1 8.8.8.8 valid=30s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
